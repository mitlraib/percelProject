<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="../../favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Phaser - Template</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #0b0b14;
        }

        body {
            position: fixed;
            inset: 0;
        }

        #app {
            position: absolute;
            inset: 0;
            overflow: hidden;
            background: #0b0b14;
            box-sizing: border-box;
        }

        #game-container {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            box-sizing: border-box;
        }

        #game-container canvas {
            display: block;
        }

        #fullscreen-btn {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 9999;
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.75);
            color: white;
        }

        #fullscreen-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>
    <div id="app">
        <button id="fullscreen-btn" type="button">מסך מלא</button>
        <div id="game-container"></div>
    </div>

    <script type="module" src="./main.ts"></script>
</body>

</html>
