<!doctype html>
<html lang="he">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="../../favicon.png" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no"
  />
  <title>Phaser - Template</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0b0b14;
      touch-action: manipulation;
    }

    body {
      min-height: 100dvh;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #0b0b14;
      box-sizing: border-box;
    }

    #game-container {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #0b0b14;
      box-sizing: border-box;
    }

    #game-container canvas {
      display: block;
      width: 100% !important;
      height: 100% !important;
    }

    #fullscreen-btn {
      position: absolute;
      top: max(12px, env(safe-area-inset-top));
      left: 12px;
      z-index: 9999;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.75);
      color: white;
    }

    #fullscreen-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <div id="app">
    <button id="fullscreen-btn" type="button">מסך מלא</button>
    <div id="game-container"></div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
